# PostgreSQL local pour le développement (docker compose up -d)
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: incubateur
    ports:
      # 5433 évite le conflit si un PostgreSQL local écoute déjà sur 5432
      - "5433:5432"
    volumes:
      - incubateur_pg:/var/lib/postgresql/data

volumes:
  incubateur_pg:
